run:
  timeout: 5m
  concurrency: 4

linters-settings:
  govet:
    check-shadowing: true
  errcheck:
    ignore: fmt:.*
  staticcheck:
    checks: ["all", "-ST1000", "-SA1019"]

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - misspell
    - revive
    - gofmt
    - goimports
    - gocritic
    - whitespace
    - unconvert
    - unparam
    - durationcheck
    - copyloopvar

issues:
  exclude-use-default: false
